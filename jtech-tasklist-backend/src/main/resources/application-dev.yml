spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:tasklist-dev;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    generate-ddl: true
server:
  port: ${PORT:8080}